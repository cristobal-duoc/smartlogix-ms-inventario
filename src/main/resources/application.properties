# Puerto del servidor embebido (Tomcat).
# Cada microservicio usa un puerto distinto para correr en paralelo en la misma maquina:
# ms-inventario: 8081 | ms-pedidos: 8082 | bff: 8080
server.port=8081

# URL de conexion a la base de datos PostgreSQL exclusiva de este microservicio.
# Patron Database per Service: cada microservicio tiene su propia BD (inventario_db).
# Esto garantiza desacoplamiento: cambios en el esquema de pedidos no afectan inventario.
spring.datasource.url=jdbc:postgresql://localhost:5432/inventario_db

# Usuario de PostgreSQL configurado durante la instalacion.
spring.datasource.username=postgres

# Contrasena de PostgreSQL. En produccion se usaria una variable de entorno,
# nunca una contrasena en texto plano en el repositorio.
# SEGURIDAD: la contrasena se lee desde la variable de entorno DB_PASSWORD.
# NUNCA se escribe el valor real aqui — este archivo va al repositorio.
# Para desarrollo local: define DB_PASSWORD=crisgresql en tu sistema,
# o crea application-local.properties (excluido en .gitignore) con el valor real.
spring.datasource.password=${DB_PASSWORD}

# Driver JDBC de PostgreSQL. Spring Boot lo detecta automaticamente desde
# la dependencia postgresql en pom.xml, pero se declara explicitamente para claridad.
spring.datasource.driver-class-name=org.postgresql.Driver

# ddl-auto=update: Hibernate actualiza el esquema de la BD automaticamente
# al arrancar la aplicacion, creando o modificando tablas segun las entidades JPA.
# En produccion se usaria "validate" o migraciones con Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update

# Muestra las sentencias SQL generadas por Hibernate en la consola.
# Util para depuracion y para verificar que los queries generados son correctos.
spring.jpa.show-sql=true

# Dialecto de PostgreSQL: le indica a Hibernate que use la sintaxis SQL
# especifica de PostgreSQL (tipos de datos, funciones, etc.).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Formatea el SQL en la consola con saltos de linea para mejor legibilidad.
spring.jpa.properties.hibernate.format_sql=true

# Nombre del microservicio. Usado por herramientas de monitoreo y service discovery.
spring.application.name=ms-inventario
