# Perfil "demo": levanta el microservicio SIN Docker ni PostgreSQL, usando H2 en memoria.
# Uso:  java -jar ms-inventario.jar --spring.profiles.active=demo
# Sobrescribe solo la conexion a la base de datos; el resto (puerto 8081, etc.) viene de application.properties.
spring.datasource.url=jdbc:h2:mem:inventario;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
