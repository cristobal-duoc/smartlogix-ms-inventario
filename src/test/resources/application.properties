# Configuracion EXCLUSIVA para pruebas (src/test/resources).
# Sobrescribe la configuracion de PostgreSQL del entorno principal y usa
# H2 en memoria, para que los tests se ejecuten de forma hermetica en local
# y en el pipeline de Integracion Continua sin necesidad de una base de datos real.

# Base de datos H2 en memoria, con modo de compatibilidad PostgreSQL.
spring.datasource.url=jdbc:h2:mem:inventario_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea el esquema al inicio de los tests y lo elimina al final.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
